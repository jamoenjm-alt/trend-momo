    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:           #eef2f8;
      --surface:      #ffffff;
      --border:       #dde5f0;
      --header-bg:    #1e40af;
      --header-text:  #ffffff;
      --th-bg:        #1e3a8a;
      --th-text:      #bfdbfe;
      --row-hover:    #eff6ff;
      --text:         #1e293b;
      --muted:        #64748b;

      /* Regime colours */
      --strong-bull-bg:   #15803d;
      --strong-bull-text: #ffffff;
      --weak-bull-bg:     #bbf7d0;
      --weak-bull-text:   #14532d;
      --chop-bg:          #fef9c3;
      --chop-text:        #854d0e;
      --weak-bear-bg:     #fee2e2;
      --weak-bear-text:   #991b1b;
      --strong-bear-bg:   #b91c1c;
      --strong-bear-text: #ffffff;
      --no-data-bg:       #f1f5f9;
      --no-data-text:     #94a3b8;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 14px;
      min-height: 100vh;
    }

    /* ── Nav Bar ─────────────────────────────────────────────── */
    .topbar {
      background: var(--header-bg);
      padding: 8px 14px;
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .topbar-logo {
      font-size: 1.1rem;
      font-weight: 800;
      color: #fff;
      letter-spacing: 0.05em;
      white-space: nowrap;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .topbar-logo svg { width: 28px; height: 28px; }
    .topbar-nav {
      display: flex;
      gap: 24px;
      flex: 1;
    }
    .topbar-nav a {
      color: #93c5fd;
      text-decoration: none;
      font-size: 0.85rem;
      font-weight: 500;
    }
    .topbar-nav a:hover { color: #fff; }
    .topbar-user {
      color: #93c5fd;
      font-size: 0.82rem;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    /* ── Page Title Banner ───────────────────────────────────── */
    .page-banner {
      background: linear-gradient(135deg, #1e3a8a 0%, #1d4ed8 100%);
      padding: 8px 14px;
      border-top: 1px solid #2563eb;
    }
    .page-banner h1 {
      font-size: 1.05rem;
      font-weight: 800;
      letter-spacing: 0.12em;
      color: #fff;
      text-transform: uppercase;
    }

    /* ── Main Content ────────────────────────────────────────── */
    .main { padding: 0 10px 20px; }

    /* ── Toolbar ─────────────────────────────────────────────── */
    .toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 0;
      border-bottom: 1px solid var(--border);
      flex-wrap: wrap;
      gap: 10px;
    }
    .toolbar-left {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 0.78rem;
      color: var(--muted);
    }
    .timestamp-badge {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .timestamp-badge .label { font-weight: 700; color: var(--text); letter-spacing: 0.04em; }
    .ts-icon { font-size: 0.85rem; }
    .utc-badge {
      background: #dbeafe;
      color: #1e40af;
      font-size: 0.7rem;
      font-weight: 700;
      padding: 2px 7px;
      border-radius: 4px;
      letter-spacing: 0.04em;
    }
    .toolbar-right {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .search-box {
      display: flex;
      align-items: center;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 5px 10px;
      gap: 6px;
      background: #fff;
    }
    .search-box input {
      border: none;
      outline: none;
      font-size: 0.8rem;
      color: var(--text);
      width: 120px;
      background: transparent;
    }
    .search-box input::placeholder { color: #9ca3af; }
    .filter-btn {
      display: flex;
      align-items: center;
      gap: 5px;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 5px 12px;
      background: #fff;
      font-size: 0.8rem;
      color: var(--text);
      cursor: pointer;
      font-weight: 500;
    }
    .filter-btn:hover { background: var(--row-hover); }

    /* ── Table ───────────────────────────────────────────────── */
    .table-wrap { overflow-x: auto; margin-top: 0; border-radius: 10px; box-shadow: 0 2px 12px rgba(30,58,138,0.08); overflow: hidden; }
    table {
      width: 100%;
      border-collapse: collapse;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
    }
    thead tr {
      background: var(--th-bg);
    }
    th {
      padding: 6px 8px;
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--th-text);
      text-align: center;
      white-space: nowrap;
      border-right: 1px solid #2d4ea8;
    }
    th:first-child, th:nth-child(2) { text-align: left; }
    th:last-child { border-right: none; }

    td {
      padding: 0;
      border-bottom: 1px solid var(--border);
      border-right: 1px solid var(--border);
      vertical-align: middle;
    }
    td:last-child { border-right: none; }
    tr:last-child td { border-bottom: none; }
    tbody tr:hover td { background: var(--row-hover); }

    /* ── Ticker cell ─────────────────────────────────────────── */
    .td-ticker { padding: 6px 8px; min-width: 55px; }
    .ticker-sym { font-size: 0.78rem; font-weight: 800; color: #1e3a8a; letter-spacing: 0.01em; }
    .td-desc { padding: 6px 8px; min-width: 100px; max-width: 150px; font-size: 0.72rem; color: #475569; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    /* ── Signal cell ─────────────────────────────────────────── */
    .td-signal {
      padding: 5px 5px;
      text-align: center;
      min-width: 100px;
      position: relative;
      cursor: default;
    }
    .signal-inner {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
    }
    .badge {
      display: inline-block;
      padding: 3px 7px;
      border-radius: 5px;
      font-size: 0.65rem;
      font-weight: 800;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      white-space: nowrap;
    }
    .badge-STRONG_BULL { background: var(--strong-bull-bg); color: var(--strong-bull-text); }
    .badge-WEAK_BULL   { background: var(--weak-bull-bg);   color: var(--weak-bull-text); }
    .badge-SIDEWAYS    { background: var(--chop-bg);        color: var(--chop-text); }
    .badge-WEAK_BEAR   { background: var(--weak-bear-bg);   color: var(--weak-bear-text); }
    .badge-STRONG_BEAR { background: var(--strong-bear-bg); color: var(--strong-bear-text); }
    .badge-NO_DATA     { background: var(--no-data-bg);     color: var(--no-data-text); }
    /* ── Balance Sheet badge ──────────────────────────────────── */
    .bs-badge    { min-width: 84px; }
    .bs-strong   { background: #15803d; color: #ffffff; }
    .bs-moderate { background: #fef3c7; color: #92400e; }
    .bs-weak     { background: #b91c1c; color: #ffffff; }


    /* Dot indicator — 4 stability states */
    .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      flex-shrink: 0;
      display: inline-block;
      cursor: help;
      box-sizing: border-box;
    }
    /* Green + black ring = Very Stable (unchanged 30+ days) */
    .dot-very-stable   { background: #16a34a; border: 2.5px solid #000; }
    /* Green = Stable (unchanged 10–30 days) */
    .dot-stable        { background: #22c55e; }
    /* Red = Unstable (changed within last 10 days) */
    .dot-unstable      { background: #ef4444; }
    /* Red + black ring = Very Unstable (multiple flips in 30 days) */
    .dot-very-unstable { background: #ef4444; border: 2.5px solid #000; }
    /* Grey = no data */
    .dot-nodata        { background: #d1d5db; }

    /* ── Table wrap ─────────────────────────────────────────── */
    .table-wrap {
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      border: 1px solid var(--border);
      border-radius: 6px;
    }
    table {
      border-collapse: collapse;
      width: 100%;
      min-width: 900px;
      background: var(--surface);
    }

    /* ── Spinner ─────────────────────────────────────────────── */
    .spinner {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid #e5e7eb;
      border-top-color: #6b7280;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Tooltip ─────────────────────────────────────────────── */
    .tooltip {
      position: fixed;
      z-index: 9999;
      background: #1f2937;
      border: 1px solid #374151;
      border-radius: 8px;
      padding: 14px 16px;
      min-width: 220px;
      pointer-events: none;
      box-shadow: 0 10px 40px rgba(0,0,0,0.4);
      color: #f9fafb;
    }
    .tt-header {
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #9ca3af;
      margin-bottom: 2px;
    }
    .tt-ticker { color: #f9fafb; font-size: 0.95rem; font-weight: 800; margin-bottom: 10px; display: block; }
    .tt-table { width: 100%; border-collapse: collapse; }
    .tt-table th {
      font-size: 0.65rem;
      font-weight: 600;
      letter-spacing: 0.07em;
      color: #9ca3af;
      text-align: left;
      padding: 0 6px 5px;
      border-bottom: 1px solid #374151;
      background: transparent;
      border-right: none;
    }
    .tt-table td {
      font-size: 0.75rem;
      padding: 4px 6px;
      border: none;
      vertical-align: middle;
    }
    .tt-pair { font-weight: 700; color: #d1d5db; letter-spacing: 0.02em; }
    .tt-pct  { font-weight: 700; text-align: right; }
    .tt-bull { color: #4ade80; }
    .tt-bear { color: #f87171; }
    .tt-bar-cell { width: 60px; }
    .tt-bar-track {
      height: 3px;
      background: #374151;
      border-radius: 2px;
      position: relative;
    }
    .tt-bar-fill {
      position: absolute;
      top: 0;
      height: 100%;
      border-radius: 2px;
    }
    .tt-price {
      margin-top: 10px;
      padding-top: 8px;
      border-top: 1px solid #374151;
      display: flex;
      justify-content: space-between;
      font-size: 0.7rem;
      color: #9ca3af;
    }
    .tt-price span:last-child { color: #f9fafb; font-weight: 700; }

    /* ── Key config panel ────────────────────────────────────── */
    .key-panel {
      background: #fffbeb;
      border: 1px solid #d97706;
      border-radius: 6px;
      padding: 16px 20px;
      margin: 16px 0;
      font-size: 0.82rem;
    }
    .key-panel h3 { font-size: 0.88rem; font-weight: 700; margin-bottom: 8px; color: #92400e; }
    .key-panel p  { color: #78350f; margin-bottom: 12px; line-height: 1.5; }
    .key-row { display: flex; gap: 8px; align-items: center; margin-bottom: 8px; flex-wrap: wrap; }
    .key-row label { font-size: 0.75rem; color: #374151; font-weight: 600; min-width: 140px; }
    .key-row input {
      flex: 1; min-width: 200px;
      border: 1px solid var(--border); border-radius: 5px;
      padding: 6px 10px; font-size: 0.8rem; outline: none;
      font-family: monospace;
    }
    .key-row input:focus { border-color: #3b82f6; }
    .key-save { background: #1d4ed8; color: #fff; border: none; padding: 8px 18px; border-radius: 5px; font-size: 0.8rem; font-weight: 600; cursor: pointer; margin-top: 4px; }
    .key-save:hover { background: #1e40af; }

    .banner-link { color: #93c5fd; cursor: pointer; text-decoration: underline; font-size: 0.78rem; }

    /* ── Loading initial ─────────────────────────────────────── */
    #root-loading { display: flex; align-items: center; justify-content: center; height: 100vh; font-size: 1rem; color: #6b7280; font-family: sans-serif; gap: 10px; }

    /* ── Section label row ───────────────────────────────────── */
    .section-label td {
      padding: 3px 8px;
      font-size: 0.62rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #3b82f6;
      background: #eff6ff;
      border-bottom: 1px solid #dbeafe;
    }

    /* ── Refresh btn ─────────────────────────────────────────── */
    .refresh-btn {
      background: none;
      border: 1px solid var(--border);
      border-radius: 5px;
      padding: 4px 10px;
      font-size: 0.75rem;
      color: var(--muted);
      cursor: pointer;
    }
    .refresh-btn:hover { background: #f3f4f6; }
  </style>
</head>

// ── Signal maths ───────────────────────────────────────────────

// Jungle Rock MA pairs — each pair generates a Trend signal (price vs slow MA)
// and a Momo signal (fast MA vs slow MA)
const MA_PAIRS = [
  { slow: 10,  fast: 3,  group: 'canary' },  // Coal Mine Canary
  { slow: 15,  fast: 5,  group: 'canary' },
  { slow: 42,  fast: 10, group: 'st'     },  // ST Trend Momo
  { slow: 50,  fast: 15, group: 'st'     },
  { slow: 63,  fast: 21, group: 'st'     },
  { slow: 84,  fast: 21, group: 'lt'     },  // LT Trend Momo
  { slow: 126, fast: 42, group: 'lt'     },
  { slow: 168, fast: 42, group: 'lt'     },
  { slow: 200, fast: 50, group: 'all'    },  // extended — only in All Indicators
  { slow: 252, fast: 63, group: 'all'    },
];

function sma(closes, w) {
  if (!closes || closes.length < w) return null;
  const slice = closes.slice(-w);
  return slice.reduce((a, b) => a + b, 0) / w;
}

function scoreToRegime(score) {
  if (score === null || score === undefined || isNaN(score)) return { label: 'No Data',     key: 'NO_DATA',     rank: 99 };
  if (score >  0.6) return { label: 'Strong Bull', key: 'STRONG_BULL', rank: 0 };
  if (score >  0.2) return { label: 'Weak Bull',   key: 'WEAK_BULL',   rank: 1 };
  if (score > -0.2) return { label: 'Sideways',    key: 'SIDEWAYS',    rank: 2 };
  if (score > -0.6) return { label: 'Weak Bear',   key: 'WEAK_BEAR',   rank: 3 };
  return                    { label: 'Strong Bear', key: 'STRONG_BEAR', rank: 4 };
}

// Stability: sample Overall regime at 4 lookback points
// NOTE: computeSignals must NOT call computeStabilityState (infinite recursion)
function computeStabilityState(closes) {
  if (!closes || closes.length < 32) return 'stable';
  const regimeAt = (lookback) => {
    const slice = closes.slice(0, closes.length - lookback);
    if (slice.length < 21) return null;
    const s = computeSignals(slice);
    return s ? scoreToRegime(s.allInd).key : null;
  };
  const r0 = regimeAt(0);
  if (!r0 || r0 === 'NO_DATA') return 'stable';
  const hist = [regimeAt(10), regimeAt(20), regimeAt(30)].filter(Boolean);
  if (!hist.length) return 'stable';
  const matching = hist.filter(r => r === r0).length;
  if (matching === hist.length) return 'very_stable';
  if (matching > 0)             return 'stable';
  if (hist.length >= 2)         return 'very_unstable';
  return 'unstable';
}

// Compute Jungle Rock MA pair signals
function computeSignals(closes) {
  const price = closes[closes.length - 1];
  // Compute all needed MAs
  const periods = [...new Set(MA_PAIRS.flatMap(p => [p.slow, p.fast]))];
  const mas = {};
  for (const n of periods) { if (closes.length >= n) mas[n] = sma(closes, n); }
  // Each pair: Trend = price vs slow MA, Momo = fast MA vs slow MA
  const pairSigs = MA_PAIRS.map(({ slow, fast, group }) => {
    const slowMA = mas[slow] ?? null;
    const fastMA = mas[fast] ?? null;
    return {
      slow, fast, group, slowMA, fastMA,
      trend: slowMA != null ? (price > slowMA ? 1 : -1) : null,
      momo:  (fastMA != null && slowMA != null) ? (fastMA > slowMA ? 1 : -1) : null,
    };
  });
  // Average non-null signals per column group
  const colAvg = (groups) => {
    const vals = pairSigs
      .filter(p => groups.includes(p.group))
      .flatMap(p => [p.trend, p.momo])
      .filter(s => s != null);
    return vals.length ? vals.reduce((a, b) => a + b, 0) / vals.length : null;
  };
  const canary  = colAvg(['canary']);
  const stTrend = colAvg(['st']);
  const ltTrend = colAvg(['lt']);
  const allInd  = colAvg(['canary', 'st', 'lt', 'all']);
  return { price, mas, pairSigs, canary, stTrend, ltTrend, allInd };
}

  try {

    if (!res.ok) return [];
    const text = await res.text();
    const lines = text.trim().split('\n').slice(1); // skip header
    if (!lines.length || lines[0].startsWith('No data')) return [];
    // CSV: Date,Open,High,Low,Close,Volume — newest first
    return lines
      .map(l => parseFloat(l.split(',')[4]))
      .filter(v => !isNaN(v) && v > 0)
      .reverse(); // oldest first
  } catch { return []; }
}

// ── News sentiment — Yahoo Finance primary, Alpha Vantage fallback ────────────
// Yahoo Finance v1 search returns recent headlines per ticker with no key/rate-limit.
// Simple keyword scoring on titles: avoids AV's 25 calls/day cap killing news entirely.

const BULL_KW = /\b(upgrade|beat|beats?|raised?|surges?|rally|rallied|record|strong|outperform|buy|top pick|growth|gains?|positive|bullish|lifted|expand|accelerat)\b/i;
const BEAR_KW = /\b(downgrade|miss|misses?|cut|cuts?|declines?|drops?|falls?|fell|weak|underperform|sell|loss|losses|negative|bearish|concern|risk|warning|layoff|recall|fine|fraud|lawsuit)\b/i;

function scoreHeadlines(articles) {
  let bull = 0, bear = 0;
  for (const title of articles) {
    if (BULL_KW.test(title)) bull++;
    if (BEAR_KW.test(title)) bear++;
  }
  if (bull === 0 && bear === 0) return 'No News';
  if (bull > bear * 1.5)        return 'Bullish';
  if (bear > bull * 1.5)        return 'Bearish';
  return 'Neutral';
}

async function fetchYFNews(ticker) {
  const yfSym = ticker === 'BRK.B' ? 'BRK-B' : ticker;
  try {
    const res = await fetchT(
      `https://query1.finance.yahoo.com/v1/finance/search?q=${yfSym}&quotesCount=0&newsCount=10&enableFuzzyQuery=false`,
      8000
    );
    if (!res.ok) return null;
    const json = await res.json();
    const titles = (json.news || []).map(a => a.title || '').filter(Boolean);
    if (!titles.length) return 'No News';
    return scoreHeadlines(titles);
  } catch { return null; }
}

async function fetchAVNews(tickers, avKey) {
  if (!avKey || !tickers.length) return {};
  const results = {};
  const BATCH = 10;
  for (let i = 0; i < tickers.length; i += BATCH) {
    const batch = tickers.slice(i, i + BATCH);
    try {
      const res = await fetchT(
        `https://www.alphavantage.co/query?function=NEWS_SENTIMENT&tickers=${batch.join(',')}&limit=50&sort=LATEST&apikey=${avKey}`
      );
      if (!res.ok) continue;
      const json = await res.json();
      if (!Array.isArray(json.feed)) {
        // Rate limited or API error — log clearly, don't silently return empty
        const msg = json.Note || json.Information || 'no feed';
        console.warn('AV news rate limited / error:', msg);
        break; // don't waste more calls
      }
      const sums = {}, wts = {};
      for (const art of json.feed) {
        for (const ts of (art.ticker_sentiment || [])) {
          if (!batch.includes(ts.ticker)) continue;
          const s = parseFloat(ts.ticker_sentiment_score) || 0;
          const r = parseFloat(ts.relevance_score) || 0.01;
          if (!sums[ts.ticker]) { sums[ts.ticker] = 0; wts[ts.ticker] = 0; }
          sums[ts.ticker] += s * r;
          wts[ts.ticker]  += r;
        }
      }
      for (const t of batch) {
        if (wts[t]) {
          const avg = sums[t] / wts[t];
          results[t] = avg > 0.15 ? 'Bullish' : avg < -0.15 ? 'Bearish' : 'Neutral';
        }
      }
    } catch (e) { console.error('AV news batch:', e.message); }
    if (i + BATCH < tickers.length) await new Promise(r => setTimeout(r, 1200));
  }
  return results;
}

// Orchestrate: AV first (more accurate), fill gaps with Yahoo Finance
async function fetchAllNews(tickers, avKey) {
  const results = {};

  // Step 1: Try Alpha Vantage (25 calls/day cap — may be exhausted)
  if (avKey) {
    const avResults = await fetchAVNews(tickers, avKey);
    Object.assign(results, avResults);
  }

  // Step 2: Yahoo Finance for any ticker AV missed (no key, no rate limit)
  const missing = tickers.filter(t => !results[t]);
  if (missing.length) {
    await Promise.all(missing.map(async (t) => {
      const r = await fetchYFNews(t);
      results[t] = r || 'No News';
    }));
  }

  return results;
}

function buyScore(sigs) {
  if (!sigs) return null;
  const { canary, stTrend, ltTrend, allInd } = sigs;
  const weighted = [[canary,1],[stTrend,2],[ltTrend,3],[allInd,4]];
  let wSum = 0, wTot = 0;
  for (const [v, w] of weighted) { if (v != null) { wSum += v * w; wTot += w; } }
  if (!wTot) return null;
  const raw  = wSum / wTot;
  const base = (raw + 1) / 2 * 9;
  const stab = sigs.stability;
  const bonus = stab === 'very_stable' ? 1 : stab === 'stable' ? 0.5 : stab === 'unstable' ? -0.5 : -1;
  return Math.min(10, Math.max(0, base + bonus));
}

    for (const a of WATCHLIST) { if (window.STATIC_PRICES?.[a.ticker]?.length) staticData[a.ticker] = window.STATIC_PRICES[a.ticker]; }

    const tdTickers = [...new Set(WATCHLIST.filter(a => ['Watch','Top20','Commodity','Index'].includes(a.cls)).filter(a => !staticData[a.ticker]).map(a => a.ticker))];
    const tdResults = {};
    for (let i = 0; i < tdTickers.length; i += 8) {
      const batch = tdTickers.slice(i, i+8);
      try {
        const res = await fetchT(`https://api.twelvedata.com/time_series?symbol=${batch.join(',')}&interval=1day&outputsize=300&apikey=${TD_KEY}`);
        if (res.ok) { const json = await res.json(); if (batch.length===1) { if (json.values) tdResults[batch[0]]=json.values.map(v=>parseFloat(v.close)).reverse(); } else { for (const t of batch) { if (json[t]?.values) tdResults[t]=json[t].values.map(v=>parseFloat(v.close)).reverse(); } } }
      } catch(e) { console.error('TD batch:',e.message); }
      if (i+8 < tdTickers.length) await new Promise(r => setTimeout(r, 700));
    }
    await Promise.all(tdTickers.filter(t=>!tdResults[t]).map(async (t) => {
      const yfSym = YF_SYMBOL_MAP[t]||t;
      try { const res = await fetchT(`https://query1.finance.yahoo.com/v8/finance/chart/${yfSym}?interval=1d&range=2y`,8000); if (!res.ok) return; const json=await res.json(); const result=json?.chart?.result?.[0]; if (!result) return; const closes=result.indicators?.quote?.[0]?.close||[]; const ts=result.timestamp||[]; const pairs=ts.map((t2,i)=>[t2,closes[i]]).filter(([,c])=>c!=null).sort((a,b)=>a[0]-b[0]); if (pairs.length>=21) tdResults[t]=pairs.map(([,c])=>c); } catch {}
    }));
    await Promise.all(tdTickers.filter(t=>!tdResults[t]).map(async (t) => { const c=await fetchStooq(t); if (c.length>=21) tdResults[t]=c; }));

    const forexResults = {};
    await Promise.all([...new Set(WATCHLIST.filter(a=>a.cls==='Forex'&&!staticData[a.ticker]).map(a=>a.ticker))].map(async (t) => {
      const yfSym=YF_SYMBOL_MAP[t]||t;
      try { const res=await fetchT(`https://query1.finance.yahoo.com/v8/finance/chart/${yfSym}?interval=1d&range=2y`,8000); if (!res.ok) return; const json=await res.json(); const result=json?.chart?.result?.[0]; if (!result) return; const closes=result.indicators?.quote?.[0]?.close||[]; const ts=result.timestamp||[]; const pairs=ts.map((t2,i)=>[t2,closes[i]]).filter(([,c])=>c!=null).sort((a,b)=>a[0]-b[0]); if (pairs.length>=21) forexResults[t]=pairs.map(([,c])=>c); } catch {}
    }));

    const fetchCoinCap = async (coinId) => {
      try { const start=Date.now()-730*24*60*60*1000; const res=await fetchT(`https://api.coincap.io/v2/assets/${coinId}/history?interval=d1&start=${start}&end=${Date.now()}`); if (!res.ok) throw new Error(`CoinCap ${res.status}`); const d=await res.json(); return (d.data||[]).map(p=>parseFloat(p.priceUsd)).filter(v=>!isNaN(v)); }
      catch(e) { console.warn('CoinCap',coinId,e.message); try { const cgMap={bitcoin:'bitcoin',ethereum:'ethereum',solana:'solana',ripple:'ripple','binance-coin':'binancecoin',cardano:'cardano',chainlink:'chainlink','the-open-network':'the-open-network','avalanche-2':'avalanche-2',sui:'sui'}; const cgId=cgMap[coinId]||coinId; const res2=await fetchT(`https://api.coingecko.com/api/v3/coins/${cgId}/market_chart?vs_currency=usd&days=365`); if (!res2.ok) return []; const d2=await res2.json(); return downsampleToDaily(d2.prices||[]); } catch { return []; } }
    };
    const cryptoAssets=[...new Set(WATCHLIST.filter(a=>a.cls==='Crypto'&&!staticData[a.ticker]).map(a=>a.ticker))];
    const cryptoFetches=await Promise.all(cryptoAssets.map(t=>fetchCoinCap(CRYPTO_COINCAP_IDS[t]||t.toLowerCase())));
    const cryptoMap=Object.fromEntries(cryptoAssets.map((t,i)=>[t,cryptoFetches[i]||[]]));

    const avKey = k.alphavantage || AV_KEY_DEFAULT;
    const newData = {};
    for (const a of WATCHLIST) {
      let closes = [];
      if (staticData[a.ticker]) closes=staticData[a.ticker];
      else if (a.cls==='Crypto') closes=cryptoMap[a.ticker]||[];
      else if (['Watch','Top20','Commodity','Index'].includes(a.cls)) closes=tdResults[a.ticker]||[];
      else if (a.cls==='Forex') closes=forexResults[a.ticker]||[];
      const sigs=closes.length>=21?computeSignals(closes):null;
      const stability=closes.length>=32?computeStabilityState(closes):'stable';
      newData[dataKey(a)]={closes:closes.length?closes:null,sigs:sigs?{...sigs,stability}:null,loading:false};
    }
    for (const a of WATCHLIST.filter(a=>(a.cls==='ASX'||a.cls==='HK')&&!staticData[a.ticker])) {
      if (!newData[dataKey(a)]?.closes) { const closes=await fetchStooq(a.ticker); if (closes.length>=21) { const sigs=computeSignals(closes); const stability=closes.length>=32?computeStabilityState(closes):'stable'; newData[dataKey(a)]={closes,sigs:sigs?{...sigs,stability}:null,loading:false}; } }
    }
    setData(newData); setLastFetch(new Date());

    const AV_INTL_MAP=[{ticker:'MQG',avSym:'MQG.AUS'},{ticker:'A2M',avSym:'A2M.AUS'},{ticker:'ANZ',avSym:'ANZ.AUS'},{ticker:'CBA',avSym:'CBA.AUS'},{ticker:'BHP',avSym:'BHP.AUS'},{ticker:'WBC',avSym:'WBC.AUS'},{ticker:'NAB',avSym:'NAB.AUS'},{ticker:'WES',avSym:'WES.AUS'},{ticker:'CSL',avSym:'CSL.AUS'},{ticker:'WDS',avSym:'WDS.AUS'},{ticker:'FMG',avSym:'FMG.AUS'},{ticker:'1211.HK',avSym:'1211.HKG'}];
    if (avKey) {
      (async () => { for (const {ticker,avSym} of AV_INTL_MAP) { if (staticData[ticker]) continue; try { const res=await fetchT(`https://www.alphavantage.co/query?function=TIME_SERIES_DAILY&symbol=${avSym}&outputsize=full&apikey=${avKey}`,12000); if (!res.ok) continue; const json=await res.json(); const ts=json['Time Series (Daily)']; if (ts) { const closes=Object.keys(ts).sort().map(d=>parseFloat(ts[d]['4. close'])).filter(v=>!isNaN(v)).slice(-300); if (closes.length>=21) { const sigs=computeSignals(closes); const stability=closes.length>=32?computeStabilityState(closes):'stable'; setData(prev=>{ const next={...prev}; for (const a of WATCHLIST.filter(a=>a.ticker===ticker)) next[dataKey(a)]={closes,sigs:sigs?{...sigs,stability}:null,loading:false}; return next; }); } } } catch(e) { console.warn('AV intl:',ticker,e.message); } await new Promise(r=>setTimeout(r,600)); } })();
    }
    setNewsData(avKey ? null : {});
    if (avKey) {
      setNewsLoading(true);
      (async () => { try { const newsTickers=[...new Set(WATCHLIST.filter(a=>!['Crypto','Commodity','Forex'].includes(a.cls)).map(a=>a.ticker))]; const newsResults=await fetchAllNews(newsTickers,avKey); setNewsData(newsResults); } catch(e) { console.warn('News fetch:',e.message); setNewsData({}); } finally { setNewsLoading(false); } })();
    }
  }, []);

  useEffect(() => { if (!loadedRef.current) { loadedRef.current=true; loadAll(keys); } }, []);
  function handleSave(k) { setKeys(k); try { localStorage.setItem('regime_keys',JSON.stringify(k)); } catch {} setShowConfig(false); loadAll(k); }
  function handleEnter(e, asset, sigs) { if (!sigs) return; setTooltip({asset,sigs,x:e.clientX,y:e.clientY}); }
  function handleLeave() { setTooltip(null); }
  function handleMouseMove(e) { if (tooltip) setTooltip(t=>t?{...t,x:e.clientX,y:e.clientY}:null); }

  const now=lastFetch||new Date();
  const dateStr=now.toISOString().slice(0,10);
  const timeStr=now.toTimeString().slice(0,8);
  const tz=(()=>{ const off=-now.getTimezoneOffset(); const hh=String(Math.floor(Math.abs(off)/60)).padStart(2,'0'); const mm=String(Math.abs(off)%60).padStart(2,'0'); return 'UTC'+(off>=0?'+':'-')+hh+':'+mm; })();
  const filtered=search.trim()?WATCHLIST.filter(a=>a.ticker.toLowerCase().includes(search.toLowerCase())||a.name.toLowerCase().includes(search.toLowerCase())):WATCHLIST;
  const sub = { fontSize:'0.6rem', fontWeight:400, letterSpacing:0, opacity:0.55, textTransform:'none', marginTop:2 };

  return h(Fragment, null,
    h('div', { className: 'topbar' },
      h('div', { className: 'topbar-logo' }, h('svg', { viewBox: '0 0 40 40', fill: 'none' }, h('circle', { cx:20,cy:20,r:19,stroke:'#4ade80',strokeWidth:2 }), h('text', { x:20,y:26,textAnchor:'middle',fontSize:18,fill:'#4ade80',fontWeight:'bold' }, String.fromCodePoint(0x1F334))), 'Regime Board'),
      h('div', { className: 'topbar-nav' }, h('a', { href:'#' }, 'Watchlist'), h('a', { href:'#' }, 'Signals'), h('a', { href:'#' }, 'Research')),
      h('span', { className: 'banner-link', onClick: () => setShowConfig(s=>!s) }, '⚙ Keys'),
    ),
    h('div', { className: 'page-banner' }, h('h1', null, 'Trend Momo')),
    h('div', { className: 'main', onMouseMove: handleMouseMove },
      showConfig && h(KeyConfig, { keys, onSave: handleSave }),
      h('div', { className: 'toolbar' },
        h('div', { className: 'toolbar-left' },
          h('div', { className: 'timestamp-badge' }, h('span', { className:'label' }, 'LAST UPDATE:'), h('span', { className:'ts-icon' }, '📅'), h('span', null, dateStr), h('span', { className:'ts-icon' }, '🕐'), h('span', null, timeStr), h('span', { className:'utc-badge' }, tz)),
          h('button', { className:'refresh-btn', onClick:()=>loadAll(keys) }, '↻ Refresh'),
        ),
        h('div', { className: 'toolbar-right' },
          h('div', { className:'search-box' }, h('span', null, '🔍'), h('input', { type:'text', placeholder:'Quick Lookup', value:search, onChange:e=>setSearch(e.target.value) })),
          h('button', { className:'filter-btn' }, '+ Filter'),
        ),
      ),
      h('div', { className: 'table-wrap' },
        h('table', null,
          h('thead', null, h('tr', null,
            h('th', null, 'Ticker'),
            h('th', null, 'Description'),
            h('th', null, h('div', null, '1–2 Week'),    h('div', { style: sub }, '10/3 · 15/5 MAs')),
            h('th', null, h('div', null, '1–3 Month'),   h('div', { style: sub }, '42/10 · 50/15 · 63/21')),
            h('th', null, h('div', null, '3–9 Month'),   h('div', { style: sub }, '84/21 · 126/42 · 168/42')),
            h('th', null, h('div', null, 'All Signals'), h('div', { style: sub }, 'all 10 MA pairs')),
            h('th', null, h('div', null, 'Balance Sheet'), h('div', { style: sub }, 'score /10')),
            h('th', null, h('div', null, 'P/E Ratio'),   h('div', { style: sub }, 'trailing')),
            h('th', null, h('div', null, 'News'),        h('div', { style: sub }, 'sentiment')),
            h('th', null, h('div', null, 'Buy Score'),   h('div', { style: sub }, 'out of 10')),
          )),
          h('tbody', null,
            SECTIONS.map(function(sec) {
              const assets=filtered.filter(a=>a.cls===sec.cls);
              if (!assets.length) return null;
              return h(Fragment, { key: sec.cls },
                h('tr', { className:'section-label' }, h('td', { colSpan:10 }, sec.label)),
                assets.map(function(asset) {
                  const d=data[asset.ticker+'__'+asset.cls]||{};
                  const sigs=d.sigs, loading=d.loading;
                  const stability=sigs?sigs.stability:'stable';
                  const colScores=sigs?[sigs.canary,sigs.stTrend,sigs.ltTrend,sigs.allInd]:[null,null,null,null];
                  return h('tr', { key: asset.ticker+asset.cls },
                    h('td', { className:'td-ticker' }, h('div', { className:'ticker-sym' }, asset.ticker)),
                    h('td', { className:'td-desc' }, asset.name),
                    colScores.map((score,i) => loading ? h('td',{key:i,className:'td-signal'},h('span',{className:'spinner'})) : h(SignalCell,{key:i,hasData:!!sigs,score,stability,onEnter:e=>handleEnter(e,asset,sigs),onLeave:handleLeave})),
                    h(BalanceSheetCell, { ticker: asset.ticker }),
                    h(PECell, { ticker: asset.ticker }),
                    h(NewsCell, { ticker: asset.ticker, newsData, loading: newsLoading }),
                    h(BuyScoreCell, { sigs, loading }),
                  );
                })
              );
            })
          )
        )
      ),
      h('div', { style: { marginTop:16, fontSize:'0.7rem', color:'#94a3b8', lineHeight:1.7 } },
        '1–2 Week = 10/3 · 15/5 MAs · 1–3 Month = 42/10 · 50/15 · 63/21 · 3–9 Month = 84/21 · 126/42 · 168/42 · All Signals = all 10 pairs. Buy Score = weighted momentum 0–10.',
        h('br'),
        'Dots: green+ring = Very Stable · green = Stable · red = Unstable · red+ring = Very Unstable. Hover for detail.',
        h('br'),
        'Data: STATIC_PRICES (update-prices.ps1) · CoinCap (crypto) · Yahoo Finance · Stooq. Balance sheet + P/E: Claude analysis. News: Alpha Vantage + Yahoo Finance.',
      ),
    ),
    tooltip && h(TrendLadder, { asset:tooltip.asset, sigs:tooltip.sigs, x:tooltip.x, y:tooltip.y }),
  );
}

createRoot(document.getElementById('root')).render(h(App));
</script>
</body>
</html>
